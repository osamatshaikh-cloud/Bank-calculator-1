<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حاسبة التمويل البنكي - أسامة شيخ</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">

<style>
:root {
  --green:#006C35;
  --green-dark:#004B28;
  --green-light:#00A859;
  --green-pale:#E8F5F0;
  --offwhite:#F5F8F6;
  --card:#FFFFFF;
  --border:#D0E8DE;
  --text:#1A2E24;
  --muted:#6B8C7A;
  --red:#D32F2F;
  --orange:#E65100;
  --shadow:rgba(0,117,74,0.10);
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Tajawal',sans-serif;
  background:var(--offwhite);
  color:var(--text);
}

/* HEADER */
.header{
  background:linear-gradient(135deg,var(--green-dark),var(--green),var(--green-light));
  box-shadow:0 4px 20px var(--shadow);
}
.header-inner{
  max-width:1180px;
  margin:auto;
  padding:18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.hicon{
  background:rgba(255,255,255,0.2);
  border-radius:12px;
  padding:10px;
  font-size:22px;
}
.header h1{color:#fff;font-size:20px;font-weight:800;}
.header p{color:#d9f2e7;font-size:12px;}

/* CARDS */
.card{
  background:var(--card);
  border-radius:14px;
  padding:18px;
  margin-bottom:14px;
  border:1px solid var(--border);
  box-shadow:0 3px 14px var(--shadow);
}
.card-title{
  color:var(--green-dark);
  font-weight:700;
  margin-bottom:10px;
}

/* INPUT */
input{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1.5px solid var(--border);
  background:#fff;
}
input:focus{
  border-color:var(--green);
  outline:none;
}

/* BUTTONS */
button{
  padding:10px;
  border-radius:10px;
  border:1px solid var(--green);
  background:#fff;
  color:var(--green-dark);
  cursor:pointer;
  font-weight:700;
}

button:hover{
  background:var(--green);
  color:#fff;
}

/* ACTIVE */
.active{
  background:var(--green)!important;
  color:#fff!important;
}

/* RESULT BOX */
.result-main{
  background:linear-gradient(135deg,var(--green-dark),var(--green));
  color:#fff;
  border-radius:14px;
  padding:20px;
  margin-top:10px;
}

.result-big{
  font-size:28px;
  font-weight:800;
}

/* SMALL FIXES */
.note{
  background:var(--green-pale);
  padding:10px;
  border-radius:8px;
  font-size:12px;
}

.footer{
  text-align:center;
  padding:20px;
  color:var(--muted);
}

</style>
</head>

<body>

<div class="header">
  <div class="header-inner">
    <div>
      <h1>حاسبة التمويل البنكي</h1>
      <p>تصميم احترافي بأسلوب البنوك 💰</p>
    </div>
    <div class="hicon">🏦</div>
  </div>
</div>

<div style="max-width:900px;margin:auto;padding:20px;">

<div class="card">
<div class="card-title">👤 بيانات العميل</div>

<input id="salary" placeholder="الراتب">
<br><br>
<input id="profitRate" placeholder="نسبة الأرباح">

<br><br>
<button onclick="calc()">احسب</button>

<div id="result" class="result-main" style="display:none;">
<div class="result-big" id="output">—</div>
</div>

</div>

</div>

<div class="footer">
by Osama Shaikh 💚
</div>

<script>
function calc(){
let s=document.getElementById('salary').value;
let r=document.getElementById('profitRate').value;

if(s && r){
let result=s * r;
document.getElementById('output').innerText=result;
document.getElementById('result').style.display='block';
}
}
</script>

</body>
</html>
